<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="background">
            <!-- <img src="img/bg.svg" alt=""> -->
          <svg  version="1.1"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          x="0px"
          y="0px"
          width="100%"
          height="100%"
          viewBox="0 0 1600 900"
          > 
            <defs>
              <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="50%" stop-color="#4BAEFE" stop-opacity="0.7" />
                <stop offset="65%" stop-color="#9035FF" stop-opacity="0.7" />
              </linearGradient>
              <path
                id="wave"
                fill="url(#bgGradient)"
                d="M-363.852,502.589c0,0,236.988-41.997,505.475,0
        s371.981,38.998,575.971,0s293.985-39.278,505.474,5.859s493.475,48.368,716.963-4.995v560.106H-363.852V502.589z"
              />
            </defs>
            <g>
              <use xlink:href="#wave" opacity=".4">
                <animateTransform
                  attributeName="transform"
                  attributeType="XML"
                  type="translate"
                  dur="8s"
                  calcMode="spline"
                  values="270 230; -334 180; 270 230"
                  keyTimes="0; .5; 1"
                  keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                  repeatCount="indefinite"
                />
              </use>
              <use xlink:href="#wave" opacity=".6">
                <animateTransform
                  attributeName="transform"
                  attributeType="XML"
                  type="translate"
                  dur="6s"
                  calcMode="spline"
                  values="-270 230;243 220;-270 230"
                  keyTimes="0; .6; 1"
                  keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                  repeatCount="indefinite"
                />
              </use>
              <use xlink:href="#wave" opacity=".9">
                <animateTransform
                  attributeName="transform"
                  attributeType="XML"
                  type="translate"
                  dur="4s"
                  calcMode="spline"
                  values="0 230;-140 200;0 230"
                  keyTimes="0; .4; 1"
                  keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                  repeatCount="indefinite"
                  />
              </use>
            </g>
          </svg>
        </div>
        <img src="img/firefox.svg" class="logo">
        <form class="form">
            <div class="textbox">
              <img src="img/person.svg" alt="">
              <input required type="text" autocomplete="off"/>
              <label>Email</label>
            </div>
            <div class="textbox">
              <img src="img/lock.svg" alt="">
              <input required type="password"/>
              <label>Password</label>
            </div>
            <button type="submit">
              <p>Login</p>
              <span class="material-symbols-outlined">arrow_forward</span>
            </button>
            </div>
        </form>
        <a href="">Forgot password?</a>
        <p class="footer">
            By using this software program, you agree to our
            <a>Terms of use</a> and <a>Privacy Policy</a>.
        </p>
    </div>
 <!-- 🔽 Telegram login -->
            <<div class="tg-login">
              <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="Authorization"
                data-size="large"
                data-auth-url="http://localhost:5000/auth/telegram">
              </script>
</body>
</html>
