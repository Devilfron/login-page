<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>login</title>
</head>
<body>
    <div class="login">
        <div class="background">
            <svg></svg>
        </div>
        <img src="img/firefox.svg" class="logo">
        <form class="form">
            <div class="textbox">
                <img src="img/person.svg" alt="">
                <input required type="text" autocomplete="off">
                <label>Email</label>
            </div>
            <div class="textbox">
                <img src="img/lock.svg" alt="">
                <input required type="password">
                <label>Password</label>
            </div>
            <button type="submit">
                <p>Login</p>
                <span class="material...">arrow_forward</span>
            </button>
        </form>
        <a>Forgot password?</a>
        <p class="footer">
            By using this software program, you agree to 
            our <a>Terms of use</a> and <a>Privacy Policy</a>.
        </p>
    </div>
</body>
</html>
